services:
  mysql:
    image: mysql:8.4
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${HOST_MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend-node:
    build:
      context: ./backendjs
      dockerfile: Dockerfile
    container_name: backend-node
    environment:
      PORT: ${BACKEND_NODE_PORT}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${HOST_BACKEND_NODE_PORT}:${BACKEND_NODE_PORT}"
    networks:
      - internal

  backend-php:
    build:
      context: ./backendphp
      dockerfile: Dockerfile
    container_name: backend-php
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      APP_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${HOST_BACKEND_PHP_PORT}:80"
    networks:
      - internal

  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "${HOST_FRONTEND_PORT}:80"
    depends_on:
      - backend-node
      - backend-php
    networks:
      - internal

  
networks:
  internal:
    driver: bridge

volumes:
  mysql_data:
